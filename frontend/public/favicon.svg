<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Teal rounded background -->
  <rect width="32" height="32" rx="8" fill="#0d9488"/>
  <!-- Dumbbell bar -->
  <rect x="9" y="15" width="14" height="2" rx="1" fill="white"/>
  <!-- Left weight outer -->
  <rect x="5" y="11" width="5" height="10" rx="2.5" fill="white"/>
  <!-- Left weight inner highlight -->
  <rect x="6" y="13" width="3" height="6" rx="1.5" fill="#0d9488" opacity="0.3"/>
  <!-- Right weight outer -->
  <rect x="22" y="11" width="5" height="10" rx="2.5" fill="white"/>
  <!-- Right weight inner highlight -->
  <rect x="23" y="13" width="3" height="6" rx="1.5" fill="#0d9488" opacity="0.3"/>
  <!-- Left collar -->
  <rect x="9" y="13" width="3" height="6" rx="1" fill="white" opacity="0.85"/>
  <!-- Right collar -->
  <rect x="20" y="13" width="3" height="6" rx="1" fill="white" opacity="0.85"/>
</svg>
