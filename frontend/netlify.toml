[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "https://fitcheck-backend-0c7q.onrender.com/api"
  VITE_APP_URL = "https://fitcheck-by-anmol.netlify.app"

# SPA fallback — send all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
