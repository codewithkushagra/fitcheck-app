services:
  - type: web
    name: fitcheck-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        value: 741239340df89039a3012383a636b29913945431e2448ac75652a5014648e13f03f6d65e0b029900da18455c61b89af7
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: fitcheck-db
          property: connectionString
      - key: CLIENT_URL
        value: https://fitcheck-by-anmol.netlify.app

databases:
  - name: fitcheck-db
    plan: free
    databaseName: fitcheck
    user: fitcheck
